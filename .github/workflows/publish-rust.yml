name: Publish regipy-rs to PyPI

# This workflow builds and publishes the optional `regipy-rs` Rust extension
# wheel. It is independent of the main `publish.yml` (which keeps shipping
# the pure-Python `regipy` package on every release exactly as before).
#
# Trigger by pushing a tag matching `regipy-rs-v*` — e.g. `regipy-rs-v0.1.0`.
# Manual dispatch is also supported.

on:
  push:
    tags: ["regipy-rs-v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheel — ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    target: x86_64-unknown-linux-gnu,  manylinux: 2014,    name: linux-x86_64 }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu, manylinux: 2014,    name: linux-aarch64 }
          - { os: ubuntu-latest,    target: x86_64-unknown-linux-musl, manylinux: musllinux_1_2, name: linux-musl-x86_64 }
          - { os: macos-13,         target: x86_64-apple-darwin,       manylinux: auto,    name: macos-x86_64 }
          - { os: macos-14,         target: aarch64-apple-darwin,      manylinux: auto,    name: macos-arm64 }
          - { os: windows-latest,   target: x86_64-pc-windows-msvc,    manylinux: auto,    name: windows-x86_64 }

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rust/regipy-py
          target: ${{ matrix.target }}
          args: --release --strip --out dist
          manylinux: ${{ matrix.manylinux }}

      - uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.name }}
          path: rust/regipy-py/dist/*.whl

  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: rust/regipy-py
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: rust/regipy-py/dist/*.tar.gz

  publish:
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
