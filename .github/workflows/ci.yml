name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check .

      - name: Run ruff formatter check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[full,dev]"

      - name: Run tests with pytest
        run: pytest -v regipy_tests/tests.py

      - name: Run CLI tests
        run: pytest -v regipy_tests/cli_tests.py

      - name: Run packaging tests
        run: pytest -v regipy_tests/test_packaging.py

      - name: Run plugin validation
        run: PYTHONPATH=. python regipy_tests/validation/plugin_validation.py

  validation-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[full,dev]"

      - name: Generate plugin validation documentation
        run: PYTHONPATH=. python regipy_tests/validation/plugin_validation.py

      - name: Upload validation documentation
        uses: actions/upload-artifact@v6
        with:
          name: plugin-validation-docs
          path: regipy_tests/validation/plugin_validation.md

  test-rust-backend:
    # Optional Rust acceleration: builds the regipy-rs extension and re-runs the
    # test suite + plugin validation under REGIPY_BACKEND=rust, plus a 1:1
    # parity check that walks every key + every value of small/medium hives
    # and asserts byte-exact equality with the construct backend.
    # This job is purely additive — the existing `test` job above continues
    # to run with the pure-Python construct backend.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/**/Cargo.lock', 'rust/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install regipy + dev deps
        run: |
          python -m pip install --upgrade pip maturin
          pip install -e ".[full,dev]"

      - name: Build and install regipy-rs wheel
        working-directory: rust/regipy-py
        run: |
          maturin build --release
          pip install --force-reinstall ../target/wheels/regipy_rs-*.whl

      - name: Run pytest with Rust backend
        env: { REGIPY_BACKEND: rust }
        run: pytest -v regipy_tests/tests.py regipy_tests/test_utils.py

      - name: Run plugin validation with Rust backend
        env: { REGIPY_BACKEND: rust }
        run: PYTHONPATH=. python regipy_tests/validation/plugin_validation.py

      - name: 1:1 parity check (DFIR safety gate)
        run: PYTHONPATH=. python regipy_tests/parity/parity_check.py

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[full,dev]"

      - name: Run mypy
        run: mypy regipy/ --ignore-missing-imports
        continue-on-error: true  # Allow failures while adding type hints incrementally

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[full,dev]"
          pip install pip-audit cyclonedx-bom

      - name: Run pip-audit (vulnerability scan)
        run: pip-audit --skip-editable

      - name: Generate SBOM (CycloneDX)
        run: |
          cyclonedx-py environment -o sbom.json --of JSON
          cyclonedx-py environment -o sbom.xml --of XML

      - name: Upload SBOM
        uses: actions/upload-artifact@v6
        with:
          name: sbom
          path: |
            sbom.json
            sbom.xml
